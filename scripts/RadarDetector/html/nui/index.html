<!DOCTYPE html>
<html>
    <head>
        <script>
            var audioPlayer = null;
            window.addEventListener('message', function(event) {
                if (event.data.transactionType == "playSound") {
                    if (audioPlayer != null) {
                        audioPlayer.pause();
                    }

                    audioPlayer = new Audio("./sounds/" + event.data.transactionFile + ".ogg");
                    audioPlayer.volume = event.data.transactionVolume;
                    audioPlayer.play();

                }
                if (event.data.transactionType == "stop" && audioPlayer != null) {
                    audioPlayer.pause();
                }

                if (event.data.transactionType == "vol" && audioPlayer != null) {
                    audioPlayer.volume = event.data.transactionVolume;
                }
                
            });
        </script>
        <meta charset="utf-8">
        <link rel="stylesheet" href="style.css">
        <script src="nui://game/ui/jquery.js" type="text/javascript"></script>
        <script src="init.js" type="text/javascript"></script>
    </head>
    <body>

        <div id="detector" class="ui-draggable ui-draggable-handle">
            <img class="detectorImg" src="images/DefaultState.png"></img>
            <div class="screeninfo">
                <div id="speed"></div>
                <div id="radar"></div>
                <div id ="units"></div>
            </div>
        </div>

    </body>
</html>
